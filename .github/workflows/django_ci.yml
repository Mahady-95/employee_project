name: Django CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "**.py"
      - "requirements*.txt"
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      GITHUB_ACTIONS: true
      DJANGO_SETTINGS_MODULE: employee_project.settings
      DJANGO_SECRET_KEY: ci-secret-key
      DEBUG: "False"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # Install system dependencies for pycairo
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository1.0-dev pkg-config python3-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 coverage

      - name: Check black version
        run: black --version

      - name: Format check with black
        run: black --check .

      - name: Lint with flake8
        run: flake8 .

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run Django system checks
        run: python manage.py check

      - name: Run tests with coverage
        run: |
          coverage run manage.py test
          coverage report --fail-under=70

  deploy_staging:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render Staging
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          https://api.render.com/deploy/srv-staging1234  # Replace with staging service ID

  deploy_production:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render Production
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          https://api.render.com/deploy/srv-prod5678  # Replace with production service ID