services:
  db:
    image: mysql:8.0
    container_name: employee_db_docker
    restart: always
    env_file:
      - .env.docker
    volumes:
      - docker_mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: employee_project-web
    restart: always
    env_file:
      - .env.docker
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn employee_project.wsgi:application --bind 0.0.0.0:8000
      "
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  docker_mysql_data:
